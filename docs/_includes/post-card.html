{% assign excerpt_text = include.post.content | strip_html | strip | truncate: 180 %}
{% assign item_line = include.post.content | split: "important content pieces were selected" | first %}
<article class="post-card">
  <a class="post-card-link" href="{{ include.post.url | relative_url }}">
    <time class="post-card-date" datetime="{{ include.post.date | date_to_xmlschema }}">
      {{ include.post.date | date: "%Y-%m-%d" }}
    </time>
    <h3 class="post-card-title">{{ include.post.title }}</h3>
    <p class="post-card-excerpt">{{ excerpt_text }}</p>
    <span class="post-card-cta">Read briefing →</span>
  </a>
</article>
