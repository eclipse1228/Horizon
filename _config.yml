title: Horizon Daily
description: AI-curated daily digest of tech and research news
baseurl: "/Horizon"
url: "https://eclipse1228.github.io"

markdown: kramdown
future: true
permalink: pretty

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - ".github"
  - "node_modules"
  - "superpowers"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
  - scope:
      path: "index.md"
    values:
      layout: home

feed:
  path: feed.xml
